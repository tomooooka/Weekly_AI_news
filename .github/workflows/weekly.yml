name: Weekly AI News

on:
  schedule:
    # 毎週月曜 9:00 JST = 日曜 0:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 anthropic

      - name: Fetch news and generate weekly article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_weekly.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: weekly news $(date -u +'%Y-%m-%d') [skip ci]"
          git push origin HEAD:main
